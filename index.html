<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Visitor Register | Smart Search</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME 6 (Free CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 20px;
            color: #2d3748;
            padding-bottom: 100px;
        }

        /* SEARCH BAR STYLES */
        .search-wrapper {
            max-width: 100%;
            margin-bottom: 24px;
            position: sticky;
            top: 12px;
            z-index: 50;
        }

        .search-container {
            background: white;
            border-radius: 60px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
            border: 1px solid rgba(79, 70, 229, 0.15);
        }

        .search-container i {
            font-size: 1.2rem;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .search-container:focus-within {
            border-color: #4f46e5;
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.12);
        }

        .search-container:focus-within i {
            color: #4f46e5;
        }

        #searchInput {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            padding: 14px 0;
            font-weight: 500;
            background: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        #searchInput::placeholder {
            color: #cbd5e1;
            font-weight: 400;
        }

        .clear-search {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .clear-search:hover {
            background: #f1f5f9;
            color: #475569;
        }

        .search-stats {
            font-size: 0.75rem;
            color: #4f46e5;
            background: #eef2ff;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 8px;
        }

        .card-container {
            background: white;
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(160, 174, 192, 0.2);
            cursor: pointer;
            transition: 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
        }

        /* hidden class for filtering */
        .card-container.hidden-card {
            display: none;
        }

        .card-title h3 {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .card-title h4 {
            color: #718096;
            font-size: 0.9rem;
        }

        .divider {
            height: 1px;
            background: #edf2f7;
            margin: 18px 0;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-label {
            font-size: 0.72rem;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 3px;
            font-weight: 600;
        }

        .info-value {
            font-size: 0.92rem;
        }

        .highlight {
            color: #4f46e5;
            font-weight: 600;
        }

        .card-footer {
            margin-top: 18px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 14px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }

        .add-btn {
            position: fixed;
            right: 25px;
            bottom: 25px;
            z-index: 90;
        }

        .add-btn button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            background: #4f46e5;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
            transition: transform 0.15s;
        }

        .add-btn button:hover {
            transform: scale(1.02);
            background: #4338ca;
        }

        /* DETAILS PAGE */
        .details-page {
            position: fixed;
            inset: 0;
            background: #f8fafc;
            z-index: 100;
            padding: 20px;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .nav-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            border: none;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .edit-btn {
            background: #4f46e5;
            color: white;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
        }

        .details-card {
            background: white;
            border-radius: 24px;
            padding: 22px;
        }

        .details-section {
            margin-top: 20px;
        }

        .details-section h4 {
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 15px;
            z-index: 300;
        }

        .modal {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            padding: 22px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid #dbe2ea;
            outline: none;
            font-family: inherit;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            border: none;
            padding: 13px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .save-btn {
            background: #4f46e5;
            color: white;
        }

        .close-btn {
            background: #edf2f7;
        }

        /* LOADING SCREEN */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.94);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader {
            width: 55px;
            height: 55px;
            border: 5px solid #e2e8f0;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .no-results {
            text-align: center;
            padding: 48px 24px;
            background: white;
            border-radius: 32px;
            color: #64748b;
            font-weight: 500;
        }

        .no-results i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 12px;
        }

        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid #dbe2ea;
            outline: none;
            font-family: inherit;
            font-size: 16px;
            background: white;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .card-container {
                padding: 18px;
            }
        }
    </style>
</head>

<body>

    <!-- SEARCH SECTION (GLOBAL) -->
    <div class="search-wrapper">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput"
                placeholder="Search by Name, Mobile, Institution, Location, Place, Narration..." autocomplete="off">
            <button class="clear-search" id="clearSearchBtn" aria-label="Clear search">
                <i class="fas fa-times-circle"></i>
            </button>
        </div>
        <div id="searchStats" class="search-stats" style="display: none;"></div>
    </div>

    <div class="cards-container" id="cardsContainer"></div>

    <div class="add-btn">
        <button id="addButton">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- DETAILS PAGE -->
    <div class="details-page" id="detailsPage">
        <div class="top-nav">
            <div class="nav-left">
                <button class="back-btn" id="backBtn">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h3>Visitor Details</h3>
            </div>
            <div class="nav-actions">
                <button class="action-btn edit-btn" id="editBtn">Edit</button>
                <button class="action-btn delete-btn" id="deleteBtn">Delete</button>
            </div>
        </div>
        <div class="details-card">
            <h2 id="detailName"></h2>
            <p id="detailMobile"></p>
            <div class="details-section">
                <h4>Place</h4>
                <p id="detailAddress"></p>
            </div>
            <div class="details-section">
                <h4>Institution</h4>
                <p id="detailInstitution"></p>
            </div>
            <div class="details-section">
                <h4>Course</h4>
                <p id="detailLocation"></p>
            </div>
            <div class="details-section">
                <h4>Narration</h4>
                <p id="detailNarration"></p>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Add Visitor</h2>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="nameInput">
            </div>
            <div class="form-group">
                <label>Mobile</label>
                <input type="text" id="mobileInput">
            </div>
            <div class="form-group">
                <label>Place</label>
                <input type="text" id="addressInput">
            </div>
            <!-- <div class="form-group">
                <label>Institution</label>
                <input type="text" id="institutionInput">
            </div> -->

            <div class="form-group">
                <label>Institution</label>

                <select id="institutionInput">

                    <option value="">Select Institution</option>

                    <option value="KIMS">KIMS</option>

                    <option value="SINDHU">SINDHU</option>

                </select>
            </div>
            <div class="form-group">
                <label>Course</label>
                <input type="text" id="locationInput">
            </div>
            <div class="form-group">
                <label>Narration</label>
                <textarea id="narrationInput"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="close-btn" id="closeModal">Cancel</button>
                <button class="save-btn" id="saveBtn">Save</button>
            </div>
        </div>
    </div>

    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <p>Please wait...</p>
    </div>
    <div id="exitBadge"
        style="display: none; position: fixed; top: 12px; right: 12px; background: #ef4444; color: white; padding: 6px 10px; border-radius: 12px; font-size: 0.8rem; z-index: 101;">
        Press back again to exit</div>
    <script>
        // ---------- GLOBAL VARIABLES ----------
        const API_URL = "https://script.google.com/macros/s/AKfycbyP2U1i84GpYBbpXfO-QTAjB0_XR4_A1ukCDPJ-amPwPfITZLAj_S1fyLqs-RKTWbShJA/exec";

        const cardsContainer = document.getElementById("cardsContainer");
        const modalOverlay = document.getElementById("modalOverlay");
        const detailsPage = document.getElementById("detailsPage");
        const loadingScreen = document.getElementById("loadingScreen");

        // Inputs
        const nameInput = document.getElementById("nameInput");
        const mobileInput = document.getElementById("mobileInput");
        const addressInput = document.getElementById("addressInput");
        const institutionInput = document.getElementById("institutionInput");
        const locationInput = document.getElementById("locationInput");
        const narrationInput = document.getElementById("narrationInput");

        // Details elements
        const detailName = document.getElementById("detailName");
        const detailMobile = document.getElementById("detailMobile");
        const detailAddress = document.getElementById("detailAddress");
        const detailInstitution = document.getElementById("detailInstitution");
        const detailLocation = document.getElementById("detailLocation");
        const detailNarration = document.getElementById("detailNarration");

        // Search elements
        const searchInput = document.getElementById("searchInput");
        const clearSearchBtn = document.getElementById("clearSearchBtn");
        const searchStats = document.getElementById("searchStats");

        let currentId = null;
        let masterData = [];     // store raw visitor objects for search & re-render
        let currentFilterText = "";

        // ---------- HELPER FUNCTIONS ----------
        function showLoading() { loadingScreen.style.display = "flex"; }
        function hideLoading() { loadingScreen.style.display = "none"; }

        function formatDate(dateString) {
            if (!dateString) return "N/A";
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return "Invalid Date";
            return date.toLocaleString("en-IN", {
                day: "2-digit",
                month: "2-digit",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit",
                hour12: true
            });
        }

        // Enhanced search: scans all visible text fields from card data (Name, Mobile, Address, Institution, Location, Narration)
        function matchesSearch(item, searchTerm) {
            if (!searchTerm.trim()) return true;
            const term = searchTerm.trim().toLowerCase();
            // Combine all relevant fields for search (any data that appears on card)
            const searchableFields = [
                item.Name, item.Mobile, item.Address,
                item.Institution, item.Location, item.Narration
            ].filter(val => val != null).map(val => String(val).toLowerCase());

            return searchableFields.some(field => field.includes(term));
        }

        // Render cards from masterData with current search filter applied
        function renderFilteredCards() {
            if (!cardsContainer) return;

            const filterText = currentFilterText;
            let visibleCount = 0;

            // Clear container but keep a placeholder for no-results message logic
            cardsContainer.innerHTML = "";

            if (masterData.length === 0) {
                // No data at all from backend (maybe empty)
                cardsContainer.innerHTML = `<div class="no-results"><i class="fas fa-address-card"></i><p>No visitors yet. Tap + to add</p></div>`;
                searchStats.style.display = "none";
                return;
            }

            // Loop and display only matching cards
            for (let i = 0; i < masterData.length; i++) {
                const item = masterData[i];
                const isMatch = matchesSearch(item, filterText);
                if (isMatch) visibleCount++;

                // generate HTML for each card (match or not, we will hide via class later)
                // But for performance, we only render visible? we need to keep consistent event binding.
                // Better approach: generate all cards but conditionally add hidden-card class.
                const cardDiv = document.createElement("div");
                cardDiv.className = "card-container";
                if (!isMatch) cardDiv.classList.add("hidden-card");
                cardDiv.setAttribute("data-id", item.ID);
                // attach click event with item data
                cardDiv.addEventListener("click", (function (visitor) {
                    return function () { openDetails(visitor); };
                })(item));

                cardDiv.innerHTML = `
                    <div class="card-title">
                        <h3>${escapeHtml(item.Name)}</h3>
                        <h4>${escapeHtml(item.Mobile)}</h4>
                    </div>
                    <div class="divider"></div>
                    <div class="info-grid">
                        <div>
                            <div class="info-label">Place</div>
                            <div class="info-value">${escapeHtml(item.Address) || "—"}</div>
                        </div>
                        <div>
                            <div class="info-label">Institution</div>
                            <div class="info-value highlight">${escapeHtml(item.Institution) || "—"}</div>
                        </div>
                        <div>
                            <div class="info-label">Course</div>
                            <div class="info-value">${escapeHtml(item.Location) || "—"}</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span>Checked In</span>
                        <strong>${formatDate(item.Date)}</strong>
                    </div>
                `;
                cardsContainer.appendChild(cardDiv);
            }

            // Update search stats
            if (filterText.trim() !== "") {
                searchStats.style.display = "inline-block";
                searchStats.innerHTML = `🔍 ${visibleCount} result${visibleCount !== 1 ? 's' : ''} for “${escapeHtml(filterText)}”`;
                if (visibleCount === 0) {
                    const emptyMsg = document.createElement("div");
                    emptyMsg.className = "no-results";
                    emptyMsg.innerHTML = `<i class="fas fa-search"></i><p>No matching visitors found.<br>Try different keywords.</p>`;
                    cardsContainer.appendChild(emptyMsg);
                }
            } else {
                searchStats.style.display = "none";
            }
        }

        // simple escape to avoid injection
        function escapeHtml(str) {

            if (str === null || str === undefined) {
                return "";
            }

            str = String(str);

            return str.replace(/[&<>]/g, function (m) {

                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';

                return m;

            });

        }

        // Apply search filter and re-render
        function applySearch() {
            currentFilterText = searchInput.value;
            renderFilteredCards();
        }

        // clear search
        function clearSearch() {
            searchInput.value = "";
            currentFilterText = "";
            renderFilteredCards();
            searchInput.focus();
        }

        // LOAD DATA from backend and store in masterData
        async function loadData() {

            showLoading();

            try {

                const response = await fetch(API_URL);

                const text = await response.text();

                console.log(text);

                const data = JSON.parse(text);

                console.log(data);

                if (!Array.isArray(data)) {

                    throw new Error("Data is not array");

                }

                masterData = data.reverse();

                renderFilteredCards();

            }

            catch (error) {

                console.error(error);

                alert("Failed to load data");

            }

            hideLoading();

        }

        // Open details view
        function openDetails(item) {
            currentId = item.ID;
            detailName.innerText = item.Name || "";
            detailMobile.innerText = item.Mobile || "";
            detailAddress.innerText = item.Address || "—";
            detailInstitution.innerText = item.Institution || "—";
            detailLocation.innerText = item.Location || "—";
            detailNarration.innerText = item.Narration || "—";
            detailsPage.style.display = "flex";
            history.pushState({ page: "details" }, "");
        }

        // Save (Add / Update)
        async function saveVisitor() {
            const action = currentId ? "update" : "add";
            const id = currentId || new Date().getTime().toString();
            const nameVal = nameInput.value.trim();
            const mobileVal = mobileInput.value.trim();
            if (!nameVal) {
                alert("Please enter visitor name.");
                return;
            }
            if (!mobileVal) {
                alert("Please enter mobile number.");
                return;
            }
            showLoading();
            try {
                const url = `${API_URL}?action=${action}&id=${encodeURIComponent(id)}&name=${encodeURIComponent(nameVal)}&mobile=${encodeURIComponent(mobileVal)}&address=${encodeURIComponent(addressInput.value)}&institution=${encodeURIComponent(institutionInput.value)}&location=${encodeURIComponent(locationInput.value)}&narration=${encodeURIComponent(narrationInput.value)}`;
                await fetch(url);
                hideLoading();
                // Close modal and also if details page open (edit case close details)
                if (modalOverlay.style.display === "flex") {
                    history.back();  // close modal
                }
                if (action === "update" && detailsPage.style.display === "flex") {
                    history.back();  // close details page after edit
                }
                await loadData();   // refresh masterData and re-render (preserving search term)
            } catch (err) {
                hideLoading();
                alert("Error saving data.");
                console.error(err);
            }
        }

        async function deleteVisitor() {
            if (!currentId) return;
            const confirmDelete = confirm("Delete this visitor permanently?");
            if (!confirmDelete) return;
            showLoading();
            try {
                await fetch(`${API_URL}?action=delete&id=${encodeURIComponent(currentId)}`);
                hideLoading();
                if (detailsPage.style.display === "flex") {
                    history.back();
                }
                await loadData();  // refresh list
            } catch (err) {
                hideLoading();
                alert("Delete failed.");
            }
        }

        // Reset modal fields
        function resetModalForAdd() {
            document.getElementById("modalTitle").innerText = "Add Visitor";
            nameInput.value = "";
            mobileInput.value = "";
            addressInput.value = "";
            institutionInput.value = "";
            locationInput.value = "";
            narrationInput.value = "";
            currentId = null;
        }

        // fill modal from current detail (edit)
        function fillModalForEdit() {
            document.getElementById("modalTitle").innerText = "Edit Visitor";
            nameInput.value = detailName.innerText;
            mobileInput.value = detailMobile.innerText;
            addressInput.value = detailAddress.innerText !== "—" ? detailAddress.innerText : "";
            institutionInput.value = detailInstitution.innerText !== "—" ? detailInstitution.innerText : "";
            locationInput.value = detailLocation.innerText !== "—" ? detailLocation.innerText : "";
            narrationInput.value = detailNarration.innerText !== "—" ? detailNarration.innerText : "";
        }

        // ----- EVENT LISTENERS & HISTORY -----
        history.pushState({ page: "home" }, "");
        let backPressedOnce = false;

        window.addEventListener("popstate", (e) => {

            // Modal open?
            if (modalOverlay.style.display === "flex") {

                modalOverlay.style.display = "none";
                return;

            }

            // Details page open?
            if (detailsPage.style.display === "flex") {

                detailsPage.style.display = "none";
                currentId = null;
                return;

            }

            // Exit warning logic
            if (!backPressedOnce) {

                backPressedOnce = true;

                // SHOW BADGE
                const badge = document.getElementById("exitBadge");

                badge.style.display = "block";

                history.pushState({ page: "home" }, "");

                setTimeout(() => {

                    badge.style.display = "none";

                    backPressedOnce = false;

                }, 2000);

            } else {

                window.close();

            }

        });

        // Buttons
        document.getElementById("addButton").addEventListener("click", () => {
            resetModalForAdd();
            modalOverlay.style.display = "flex";
            history.pushState({ page: "modal" }, "");
        });

        document.getElementById("backBtn").addEventListener("click", () => {
            history.back();
        });

        document.getElementById("editBtn").addEventListener("click", () => {
            fillModalForEdit();
            modalOverlay.style.display = "flex";
            history.pushState({ page: "modal" }, "");
        });

        document.getElementById("deleteBtn").addEventListener("click", () => {
            deleteVisitor();
        });

        document.getElementById("closeModal").addEventListener("click", () => {
            history.back();
        });

        document.getElementById("saveBtn").addEventListener("click", () => {
            saveVisitor();
        });

        // Search listeners
        searchInput.addEventListener("input", () => {
            applySearch();
        });
        clearSearchBtn.addEventListener("click", () => {
            clearSearch();
        });

        // Initial load
        loadData();

        if ("serviceWorker" in navigator) {

            window.addEventListener("load", () => {

                navigator.serviceWorker.register("service-worker.js")
                    .then(() => {

                        console.log("PWA Ready");

                    });

            });

        }
    </script>
</body>

</html>
